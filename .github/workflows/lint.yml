name: Lint

on:
  push:
    branches: ["**"]

jobs:
  lint:
    name: Ruff lint + format check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Check lint
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .
